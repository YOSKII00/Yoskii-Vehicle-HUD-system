<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hud-container" class="hidden">

        <div id="hud-main">

            <!-- SPEEDOMETER -->
            <div id="speedo-wrap">
                <svg id="rpm-arc-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
                    <circle class="arc-track" cx="110" cy="110" r="95" />
                    <circle id="rpm-fill" class="arc-fill rpm-arc" cx="110" cy="110" r="95" />
                </svg>
                <div id="speedo-center">
                    <div id="speed-value">0</div>
                    <div id="speed-unit">MPH</div>
                </div>
                <div id="gear-badge"><span id="gear-letter">N</span></div>
            </div>

            <!-- STAT BARS: Fuel · Engine · Body -->
            <div id="stat-bars">

                <div class="stat-row">
                    <div class="stat-label-group">
                        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M3 22h12a1 1 0 0 0 1-1V9l-4-6H3a1 1 0 0 0-1 1v17a1 1 0 0 0 1 1z"/>
                            <path d="M16 9h3a1 1 0 0 1 1 1v3l1 1v4"/>
                        </svg>
                        <span class="stat-name">FUEL</span>
                    </div>
                    <div class="stat-bar-wrap"><div class="stat-bar"><div class="stat-bar-fill fuel-fill-bar" id="fuel-bar-fill"></div></div></div>
                    <span class="stat-pct" id="fuel-pct">---%</span>
                </div>

                <div class="stat-row">
                    <div class="stat-label-group">
                        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <rect x="2" y="7" width="20" height="13" rx="2"/>
                            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
                            <line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/>
                        </svg>
                        <span class="stat-name">ENGINE</span>
                    </div>
                    <div class="stat-bar-wrap"><div class="stat-bar"><div class="stat-bar-fill engine-fill-bar" id="engine-bar-fill"></div></div></div>
                    <span class="stat-pct" id="engine-pct">---%</span>
                </div>

                <div class="stat-row">
                    <div class="stat-label-group">
                        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                        <span class="stat-name">BODY</span>
                    </div>
                    <div class="stat-bar-wrap"><div class="stat-bar"><div class="stat-bar-fill body-fill-bar" id="body-bar-fill"></div></div></div>
                    <span class="stat-pct" id="body-pct">---%</span>
                </div>

            </div>

            <!-- MECHANIC CONDITION (jg-mechanic — appears only when data exists) -->
            <div id="mech-section">
                <div class="section-divider">
                    <span class="section-label">SERVICE CONDITION</span>
                    <span id="needs-service-badge" class="needs-service hidden">⚠ DUE</span>
                </div>
                <div id="mech-bars">

                    <div class="mech-row">
                        <span class="mech-label">OIL</span>
                        <div class="mech-bar-wrap"><div class="mech-bar"><div class="mech-bar-fill" id="mech-oil-fill"></div></div></div>
                        <span class="mech-pct" id="mech-oil-pct">N/A</span>
                    </div>

                    <div class="mech-row">
                        <span class="mech-label">BRAKES</span>
                        <div class="mech-bar-wrap"><div class="mech-bar"><div class="mech-bar-fill" id="mech-brakes-fill"></div></div></div>
                        <span class="mech-pct" id="mech-brakes-pct">N/A</span>
                    </div>

                    <div class="mech-row">
                        <span class="mech-label">TYRES</span>
                        <div class="mech-bar-wrap"><div class="mech-bar"><div class="mech-bar-fill" id="mech-tyres-fill"></div></div></div>
                        <span class="mech-pct" id="mech-tyres-pct">N/A</span>
                    </div>

                    <div class="mech-row">
                        <span class="mech-label">SUSP</span>
                        <div class="mech-bar-wrap"><div class="mech-bar"><div class="mech-bar-fill" id="mech-susp-fill"></div></div></div>
                        <span class="mech-pct" id="mech-susp-pct">N/A</span>
                    </div>

                    <div class="mech-row">
                        <span class="mech-label">PLUGS</span>
                        <div class="mech-bar-wrap"><div class="mech-bar"><div class="mech-bar-fill" id="mech-plugs-fill"></div></div></div>
                        <span class="mech-pct" id="mech-plugs-pct">N/A</span>
                    </div>

                    <div class="mech-row">
                        <span class="mech-label">FILTER</span>
                        <div class="mech-bar-wrap"><div class="mech-bar"><div class="mech-bar-fill" id="mech-filter-fill"></div></div></div>
                        <span class="mech-pct" id="mech-filter-pct">N/A</span>
                    </div>

                    <div class="mech-row">
                        <span class="mech-label">CLUTCH</span>
                        <div class="mech-bar-wrap"><div class="mech-bar"><div class="mech-bar-fill" id="mech-clutch-fill"></div></div></div>
                        <span class="mech-pct" id="mech-clutch-pct">N/A</span>
                    </div>

                </div>
            </div>

            <!-- STATUS PILLS -->
            <div id="status-row">
                <div id="seatbelt-indicator" class="status-pill">
                    <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2a4 4 0 0 1 4 4v6l3 3-3 3v1a4 4 0 0 1-8 0v-1l-3-3 3-3V6a4 4 0 0 1 4-4z"/>
                        <line x1="12" y1="12" x2="12" y2="19"/>
                    </svg>
                    <span class="status-label">BELT</span>
                </div>
                <div id="engine-indicator" class="status-pill">
                    <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="7" width="20" height="13" rx="2"/>
                        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
                        <line x1="12" y1="12" x2="12" y2="16"/>
                    </svg>
                    <span class="status-label">ENG</span>
                </div>
                <div id="lock-indicator" class="status-pill">
                    <svg id="lock-icon-locked" class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <svg id="lock-icon-unlocked" class="status-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
                    </svg>
                    <span class="status-label">LOCK</span>
                </div>
                <div id="key-indicator" class="status-pill">
                    <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="7.5" cy="15.5" r="5.5"/>
                        <path d="M21 2l-9.6 9.6"/>
                        <path d="M15.5 7.5l3 3L22 7l-3-3"/>
                    </svg>
                    <span class="status-label">KEY</span>
                </div>
            </div>

            <!-- WARNING TICKER -->
            <div id="warning-ticker" class="hidden"><span id="warning-text">⚠ LOW FUEL</span></div>

            <!-- PLATE + MILEAGE -->
            <div id="plate-display">
                <div id="plate-text">------</div>
                <div id="mileage-text">0 km</div>
            </div>

        </div>

        <div id="passenger-badge" class="hidden">PASSENGER</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
